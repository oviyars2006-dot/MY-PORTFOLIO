<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graphic Collections | Oviya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #fff; overflow-x: hidden; }
        .outline-text { -webkit-text-stroke: 1.5px #ffffff; color: transparent; opacity: 0.1; }
        
        /* Modal Overlay */
        #gallery-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            overflow-y: auto;
            padding: 4rem 2rem;
        }
    </style>
</head>
<body>

    <nav class="p-8 flex justify-between items-center fixed top-0 w-full z-50 bg-black/80 backdrop-blur-md">
        <a href="index.html" class="font-black text-xl uppercase tracking-tighter">OVIYA.</a>
        <a href="index.html" class="text-xs font-bold uppercase tracking-widest px-6 py-2 border border-white/20 rounded-full hover:bg-white hover:text-black transition-all">Exit Gallery</a>
    </nav>

    <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <h1 class="outline-text text-8xl font-black uppercase mb-16">Collections</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div onclick="openGallery('branding')" class="group cursor-pointer">
                <div class="aspect-[3/4] overflow-hidden rounded-2xl bg-zinc-900 border border-white/5 relative">
                    <img src="CASE 5.png" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="Branding">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-xs font-bold uppercase tracking-widest">View 2 Images</span>
                    </div>
                </div>
                <h3 class="mt-6 font-black uppercase text-xl">GRAPHICH MOCKUP DESIGN</h3>
                <p class="text-gray-500 text-xs uppercase tracking-widest">Identity & Logo Design</p>
            </div>

            <div onclick="openGallery('social')" class="group cursor-pointer">
                <div class="aspect-[3/4] overflow-hidden rounded-2xl bg-zinc-900 border border-white/5 relative">
                    <img src="BANGARAM CAFE 1.png" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="Social Media">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-xs font-bold uppercase tracking-widest">View 8 Images</span>
                    </div>
                </div>
                <h3 class="mt-6 font-black uppercase text-xl">Marketing Kits</h3>
                <p class="text-gray-500 text-xs uppercase tracking-widest">Social Media Assets</p>
            </div>

            <div onclick="openGallery('posters')" class="group cursor-pointer">
                <div class="aspect-[3/4] overflow-hidden rounded-2xl bg-zinc-900 border border-white/5 relative">
                    <img src="MAGGIE3-1.png" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" alt="Posters">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        <span class="text-xs font-bold uppercase tracking-widest">View 5 Images</span>
                    </div>
                </div>
                <h3 class="mt-6 font-black uppercase text-xl">Film Posters</h3>
                <p class="text-gray-500 text-xs uppercase tracking-widest">Digital Illustrations</p>
            </div>

        </div>
    </main>

    <div id="gallery-overlay">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-12">
                <h2 id="gallery-title" class="text-3xl font-black uppercase tracking-widest">Collection Name</h2>
                <button onclick="closeGallery()" class="text-xs font-bold uppercase tracking-widest px-4 py-2 border border-white/50 hover:bg-white hover:text-black transition-all">Close [ESC]</button>
            </div>
            
            <div id="gallery-content" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                </div>
        </div>
    </div>

    <script>
        // Data for your collections
        const collections = {
            branding: {
                title: "Sakura Branding Identity",
                images: ["CASE 5.png", "CASE 4.png"]
            },
            social: {
                title: "Social Media Marketing Kits",
                images: ["BANGARAM CAFE 1.png"]
            },
            posters: {
                title: "Cinematic Posters",
                images: ["MAGGIE3-1.png", "MAGGIEEEE-1.png"]
            }
        };

        function openGallery(id) {
            const data = collections[id];
            const overlay = document.getElementById('gallery-overlay');
            const content = document.getElementById('gallery-content');
            const title = document.getElementById('gallery-title');

            title.innerText = data.title;
            content.innerHTML = data.images.map(img => `
                <div class="rounded-xl overflow-hidden bg-zinc-800">
                    <img src="${img}" class="w-full h-auto" loading="lazy">
                </div>
            `).join('');

            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden'; // Stop background scrolling
        }

        function closeGallery() {
            document.getElementById('gallery-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Close on ESC key
        window.addEventListener('keydown', (e) => { if(e.key === "Escape") closeGallery(); });
    </script>

</body>
</html>
